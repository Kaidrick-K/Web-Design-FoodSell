<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FEASTORY – Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #1a4d6e;
      --primary-light: #2a6d9e;
      --accent:        #f4a835;
      --bg:            #f5f6fa;
      --card-bg:       #ffffff;
      --text:          #1c2340;
      --muted:         #8a91a8;
      --radius:        14px;
      --nav-h:         65px;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #e8eaf0;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }

    /* ── Phone shell ── */
    .phone {
      position: relative;
      width: 100%;
      max-width: 420px;
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Scrollable content area (above bottom nav) ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(var(--nav-h) + 12px);
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ══════════════════════════════
       TOP HEADER
    ══════════════════════════════ */
    .header {
      background: var(--primary);
      padding: 46px 20px 22px;
      position: relative;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .greeting-line {
      font-size: 13px;
      color: rgba(255,255,255,0.70);
      font-weight: 400;
    }

    .greeting-name {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .header-icons {
      display: flex;
      gap: 10px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      transition: background .2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.25); }
    .icon-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* Search bar */
    .search-wrap {
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border-radius: 30px;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: #fff;
      outline: none;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }
    .search-input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      fill: var(--muted);
      pointer-events: none;
    }

    /* ══════════════════════════════
       QUICK ACTIONS (Delivery / Pick-Up)
    ══════════════════════════════ */
    .quick-actions {
      display: flex;
      gap: 12px;
      padding: 20px 20px 4px;
    }

    .qa-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 30px;
      border: 2px solid transparent;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .qa-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .qa-btn.inactive {
      background: #fff;
      color: var(--muted);
      border-color: #e0e3ec;
    }
    .qa-btn svg { width: 16px; height: 16px; }

    /* ══════════════════════════════
       SECTION TITLES
    ══════════════════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 12px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .section-link {
      font-size: 12px;
      color: var(--primary-light);
      text-decoration: none;
      font-weight: 500;
    }

    /* ══════════════════════════════
       RESTORAN POPULER (horizontal scroll)
    ══════════════════════════════ */
    .popular-scroll {
      display: flex;
      gap: 14px;
      padding: 0 20px 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .popular-scroll::-webkit-scrollbar { display: none; }

    .restaurant-card {
      flex: 0 0 160px;
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;
      transition: transform .2s;
    }
    .restaurant-card:hover { transform: translateY(-3px); }

    .rc-img {
      width: 100%;
      height: 110px;
      background: #d8dce6;
      position: relative;
      overflow: hidden;
    }
    /* REPLACE: insert <img src="..." alt="..."/> inside .rc-img */
    .rc-img img { width:100%; height:100%; object-fit:cover; display:block; }

    .rc-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 20px;
    }

    .rc-body {
      padding: 10px 12px;
    }
    .rc-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rc-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
    }
    .star-icon { color: #f4a835; font-size: 11px; }

    /* ══════════════════════════════
       REKOMENDASI (2-col grid)
    ══════════════════════════════ */
    .reko-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 0 20px;
    }

    .reko-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;
      transition: transform .2s;
    }
    .reko-card:hover { transform: translateY(-3px); }

    .reko-img {
      width: 100%;
      height: 105px;
      background: #d0d5e2;
      overflow: hidden;
    }
    /* REPLACE: insert <img src="..." alt="..."/> inside .reko-img */
    .reko-img img { width:100%; height:100%; object-fit:cover; display:block; }

    .reko-body {
      padding: 10px 12px;
    }
    .reko-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .reko-price {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
    }

    /* ══════════════════════════════
       PROMO BANNER
    ══════════════════════════════ */
    .promo-scroll {
      display: flex;
      gap: 14px;
      padding: 0 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .promo-scroll::-webkit-scrollbar { display: none; }

    .promo-banner {
      flex: 0 0 280px;
      height: 110px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 18px;
    }
    /* REPLACE: insert <img> for banner background inside .promo-banner */
    .promo-banner img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .35;
    }

    .promo-copy {
      position: relative;
      z-index: 1;
    }
    .promo-label {
      font-size: 11px;
      color: rgba(255,255,255,.75);
      font-weight: 500;
    }
    .promo-title {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
    }
    .promo-sub {
      font-size: 11px;
      color: rgba(255,255,255,.75);
    }

    /* ══════════════════════════════
       BOTTOM NAVIGATION
    ══════════════════════════════ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      height: var(--nav-h);
      background: #fff;
      border-top: 1px solid #e8eaf0;
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.07);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      text-decoration: none;
      padding: 6px 16px;
      border-radius: 12px;
      transition: background .2s;
    }
    .nav-item:hover { background: #f0f4f8; }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
    }
    .nav-item.active .nav-label { color: var(--primary); }
    .nav-item.active svg { fill: var(--primary) !important; }
    .nav-item svg { fill: var(--muted); transition: fill .2s; }

    /* ── Spacing at section bottoms ── */
    .section-spacer { height: 6px; }

    @media (min-width: 600px) {
      body { background: #0a0f14; }
      .phone {
        min-height: unset;
        border-radius: 40px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.7);
        height: 820px;
        margin: 30px 0;
      }
      .bottom-nav {
        border-radius: 0 0 40px 40px;
      }
    }
  </style>
</head>
<body>
    <p>Halo, Selamat Datang di Food Sell!</p>
</body>
</html>
