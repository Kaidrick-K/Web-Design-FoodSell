<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FEASTORY - Welcome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #1a4d6e;
      --primary-hover: #2a6d9e;
      --accent:        #f4a835;
      --white:         #ffffff;
      --font:          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }

    body {
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      background: #0a0f14;
    }

    /* =====================
       MOBILE: full screen hero
    ===================== */
    .hero-side {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Background image area */
    .hero-bg {
      position: absolute;
      inset: 0;
      /* REPLACE: background-image: url('hero-bg.jpg'); */
      background: linear-gradient(160deg, #2c1a0e 0%, #1a3a1a 50%, #0a1a2a 100%);
      background-size: cover;
      background-position: center;
    }

    /* Food photo grid overlay */
    .food-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 4px;
      opacity: 0.55;
    }
    .food-cell {
      overflow: hidden;
    }
    /* REPLACE each: add <img src="food.jpg" alt="..."> inside .food-cell */
    .food-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .food-cell:nth-child(1) { background: linear-gradient(135deg,#c97b3b,#8b4513); grid-row: span 2; }
    .food-cell:nth-child(2) { background: linear-gradient(135deg,#d4a060,#7a3010); }
    .food-cell:nth-child(3) { background: linear-gradient(135deg,#8fbc5c,#3a6010); }

    /* Dark gradient from bottom */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.10) 0%,
        rgba(0,0,0,0.30) 40%,
        rgba(5,15,25,0.92) 75%,
        rgba(5,15,25,1.00) 100%
      );
    }

    /* Content on top of overlay */
    .hero-content {
      position: relative;
      z-index: 2;
      padding: 40px 32px 52px;
    }

    .logo-block {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-icon-wrap {
      width: 52px; height: 52px;
      background: var(--primary);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon-wrap svg { width: 28px; height: 28px; }

    .logo-text-block { line-height: 1; }
    .logo-name {
      font-size: 26px; font-weight: 800;
      color: var(--white); letter-spacing: 2px; text-transform: uppercase;
    }
    .logo-name span { color: var(--accent); }
    .logo-tagline { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; letter-spacing: 0.5px; }

    .hero-heading {
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .hero-heading em { font-style: normal; color: var(--accent); }

    .hero-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.60);
      line-height: 1.6;
      margin-bottom: 36px;
      max-width: 380px;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 420px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: var(--font);
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }
    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
      box-shadow: 0 6px 24px rgba(26,77,110,0.60);
    }
    .btn-primary:hover { background: var(--primary-hover); }

    .btn-outline {
      background: rgba(255,255,255,0.10);
      color: var(--white);
      border: 2px solid rgba(255,255,255,0.50);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.18); }

    /* =====================
       TABLET / DESKTOP: split layout
    ===================== */
    @media (min-width: 768px) {
      body { flex-direction: row; }

      /* Left: hero image — takes up ~55% */
      .hero-side {
        flex: 0 0 55%;
        min-height: unset;
      }

      .food-grid { opacity: 0.65; }

      .hero-content {
        padding: 60px 52px 60px;
      }

      .hero-heading { font-size: clamp(28px, 3vw, 44px); }
      .hero-sub     { font-size: 15px; }

      .btn-group {
        flex-direction: row;
        max-width: none;
      }
      .btn { width: auto; flex: 1; }
    }

    @media (min-width: 1200px) {
      .hero-side { flex: 0 0 60%; }
      .hero-content { padding: 80px 72px; }
    }
  </style>
</head>
<body>

  <!-- Hero / branding side -->
  <div class="hero-side">
    <div class="hero-bg"></div>

    <!-- Food photo grid -->
    <div class="food-grid">
      <div class="food-cell">
        <!-- REPLACE: <img src="food1.jpg" alt="Food"> -->
      </div>
      <div class="food-cell">
        <!-- REPLACE: <img src="food2.jpg" alt="Food"> -->
      </div>
      <div class="food-cell">
        <!-- REPLACE: <img src="food3.jpg" alt="Food"> -->
      </div>
    </div>

    <div class="hero-overlay"></div>

    <div class="hero-content">

      <!-- Logo -->
      <div class="logo-block">
        <div class="logo-icon-wrap">
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M9 4v6a3 3 0 0 0 2 2.83V24h2V12.83A3 3 0 0 0 15 10V4h-1.5v5h-1V4H11v5h-1V4H9z" fill="#f4a835"/>
            <path d="M18 4c-1.1 0-2 1.5-2 4v5h1.5V24H19V4h-1z" fill="#f4a835"/>
          </svg>
        </div>
        <div class="logo-text-block">
          <div class="logo-name">F<span>east</span>ory</div>
          <div class="logo-tagline">Food Delivery &amp; Pick-Up</div>
        </div>
      </div>

      <!-- Heading -->
      <h1 class="hero-heading">
        Selamat Datang<br/>di <em>FEASTORY!</em>
      </h1>
      <p class="hero-sub">
        Tempat di Mana Hidangan dan Kisahnya Bertemu.
        Pesan makanan favoritmu dengan mudah, cepat, dan lezat.
      </p>

      <!-- CTA Buttons -->
      <div class="btn-group">
        <a href="index.html" class="btn btn-primary">Masuk</a>
        <a href="#"          class="btn btn-outline">Buat Akun</a>
      </div>

    </div>
  </div>

</body>
</html>
