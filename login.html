<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FEASTORY – Selamat Datang</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #1a4d6e;
      --primary-light: #2a6d9e;
      --white:     #ffffff;
      --radius:    14px;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #111;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Phone shell ── */
    .phone {
      position: relative;
      width: 100%;
      max-width: 420px;
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero background ── */
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      /* Replace with real food background image */
      background: url('placeholder-hero-bg.jpg') center/cover no-repeat;
      background-color: #1a1a1a; /* fallback */
    }

    /* dark gradient overlay so text stays readable */
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10, 20, 30, 0.45) 0%,
        rgba(10, 20, 30, 0.55) 40%,
        rgba(10, 20, 30, 0.85) 75%,
        rgba(10, 20, 30, 0.97) 100%
      );
    }

    /* ── Decorative food-image collage (top half) ── */
    .hero-collage {
      position: relative;
      z-index: 1;
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 6px;
      padding: 50px 18px 18px;
    }

    .collage-cell {
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
    }

    /* individual cells can be replaced with real food images */
    .collage-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .collage-cell.tall { grid-row: span 2; }

    /* placeholder tint colours for each cell */
    .collage-cell:nth-child(1) { background: rgba(180,90,30,0.35); }
    .collage-cell:nth-child(2) { background: rgba(120,60,20,0.35); }
    .collage-cell:nth-child(3) { background: rgba(200,120,40,0.35); }
    .collage-cell:nth-child(4) { background: rgba(160,80,25,0.35); }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 24px;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .logo-icon svg { width: 36px; height: 36px; }

    .logo-text {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .logo-text span { color: #f4a835; }

    /* ── Welcome copy ── */
    .welcome-copy {
      position: relative;
      z-index: 1;
      padding: 18px 28px 0;
      text-align: center;
    }

    .welcome-copy h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.3;
    }

    .welcome-copy h1 em {
      font-style: normal;
      color: #f4a835;
    }

    .welcome-copy p {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
    }

    /* ── CTA buttons ── */
    .cta-area {
      position: relative;
      z-index: 1;
      padding: 28px 24px 48px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      border-radius: var(--radius);
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s;
    }

    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
      box-shadow: 0 6px 20px rgba(26,77,110,0.55);
    }

    .btn-primary:hover { background: var(--primary-light); }

    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 2px solid rgba(255,255,255,0.75);
    }

    .btn-outline:hover { background: rgba(255,255,255,0.1); }

    /* ── Responsive: desktop centers the card ── */
    @media (min-width: 600px) {
      body { background: #0a0f14; }
      .phone {
        min-height: unset;
        border-radius: 40px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.7);
        height: 820px;
      }
    }
  </style>
</head>
<body>

<div class="phone">

  <!-- Dark hero background (replace URL in .hero-bg CSS) -->
  <div class="hero-bg" aria-hidden="true"></div>

  <!-- Food image collage (top half) -->
  <div class="hero-collage">
    <!-- Replace each img src with real food photos -->
    <div class="collage-cell tall">
      <img src="placeholder-food-1.jpg" alt="Food 1"/>
      <!-- REPLACE: stir-fry / main dish photo -->
    </div>
    <div class="collage-cell">
      <img src="placeholder-food-2.jpg" alt="Food 2"/>
      <!-- REPLACE: soup / bowl photo -->
    </div>
    <div class="collage-cell">
      <img src="placeholder-food-3.jpg" alt="Food 3"/>
      <!-- REPLACE: grilled food photo -->
    </div>
  </div>

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <!-- Inline fork-knife SVG icon -->
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="18" fill="#1a4d6e"/>
        <path d="M13 9v5a3 3 0 0 0 2 2.83V27h2V16.83A3 3 0 0 0 19 14V9h-1.5v4h-1V9H15v4h-1V9H13z" fill="#f4a835"/>
        <path d="M22 9c-1.1 0-2 1.5-2 4v5h1.5V27H23V9h-1z" fill="#f4a835"/>
      </svg>
    </div>
    <div class="logo-text">F<span>east</span>ory</div>
  </div>

  <!-- Welcome copy -->
  <div class="welcome-copy">
    <h1>Selamat Datang<br/>di <em>FEASTORY!</em></h1>
    <p>Tempat di Mana Hidangan dan Kisahnya Bertemu</p>
  </div>

  <!-- CTA buttons -->
  <div class="cta-area">
    <!-- Masuk navigates to Home page -->
    <a href="index.html" class="btn btn-primary">Masuk</a>
    <!-- Buat Akun stays on same page (extend later) -->
    <a href="#" class="btn btn-outline">Buat Akun</a>
  </div>

</div>

<script>
  // Simple ripple feedback on buttons
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const ripple = document.createElement('span');
      const rect = this.getBoundingClientRect();
      ripple.style.cssText = `
        position:absolute;width:20px;height:20px;border-radius:50%;
        background:rgba(255,255,255,0.35);pointer-events:none;
        transform:scale(0);animation:ripple .5s linear;
        left:${e.clientX - rect.left - 10}px;top:${e.clientY - rect.top - 10}px;
      `;
      this.style.position = 'relative';
      this.style.overflow = 'hidden';
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 500);
    });
  });
</script>

<style>
  @keyframes ripple { to { transform: scale(8); opacity: 0; } }
</style>

</body>
</html>
